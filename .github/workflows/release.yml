name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Build Python wheel ──────────────────────────────────────────────────
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build distribution
        run: |
          pip install build
          python -m build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/

  # ── Publish to PyPI ─────────────────────────────────────────────────────
  publish-pypi:
    needs: build-wheel
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # ── Standalone desktop binaries ─────────────────────────────────────────
  build-desktop:
    needs: build-wheel
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: lore-linux-x64
          - os: macos-latest
            name: lore-macos-arm64
          - os: windows-latest
            name: lore-windows-x64
            ext: .exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libopengl0 libxkbcommon-x11-0

      - name: Install project + PyInstaller
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Build standalone executable
        run: |
          pyinstaller --onefile --name lore src/main.py \
            --hidden-import PyQt6 \
            --hidden-import faster_whisper \
            --hidden-import llama_cpp \
            --hidden-import sqlite_vec \
            --hidden-import fastembed \
            --collect-all resemblyzer \
            --collect-all gliner2_onnx

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/lore${{ matrix.ext }}

  # ── GitHub Release ─────────────────────────────────────────────────────
  create-release:
    needs: [build-wheel, build-desktop]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Lore ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/lore
            dist/lore.exe
          fail_on_unmatched_files: false
