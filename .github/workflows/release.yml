name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build distribution
        run: |
          pip install build
          python -m build
      - name: Stage wheels
        run: |
          mkdir -p wheels
          cp dist/*.whl dist/*.tar.gz wheels/
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheels
          path: wheels/

  publish-pypi:
    needs: build-wheel
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-wheels
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  build-desktop:
    needs: build-wheel
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: lore-linux-x86_64
            ext: tar.gz
          - os: macos-latest
            name: lore-macos-arm64
            ext: tar.gz
          - os: windows-latest
            name: lore-windows-x86_64
            ext: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libopengl0 libxkbcommon0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libdbus-1-3

      - name: Install project and PyInstaller
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Remove typing backport
        shell: bash
        run: pip uninstall -y typing 2>/dev/null || true

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller \
            --onedir \
            --name lore \
            --hidden-import PyQt6 \
            --hidden-import PyQt6.QtQuick \
            --hidden-import faster_whisper \
            --hidden-import ctranslate2 \
            --hidden-import llama_cpp \
            --hidden-import sqlite_vec \
            --hidden-import fastembed \
            --hidden-import cryptography \
            --hidden-import cryptography.fernet \
            --hidden-import cryptography.hazmat.primitives.kdf.pbkdf2 \
            --hidden-import sklearn.cluster \
            --hidden-import sklearn.utils._typedefs \
            --hidden-import sklearn.neighbors._partition_nodes \
            --collect-all gliner2_onnx \
            --collect-all resemblyzer \
            --collect-all pyannote \
            src/main.py

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: tar -czf "${{ matrix.name }}.${{ matrix.ext }}" -C dist lore/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: 7z a "${{ matrix.name }}.${{ matrix.ext }}" dist/lore/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.${{ matrix.ext }}

  create-release:
    needs: [build-wheel, build-desktop]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: python-wheels
          path: release/

      - name: Download desktop artifacts (macOS + Windows only, Linux >2GB)
        uses: actions/download-artifact@v4
        with:
          pattern: |
            lore-macos-*
            lore-windows-*
          path: release/
        continue-on-error: true

      - name: List release assets
        run: |
          echo "Assets to upload:"
          find release/ -type f -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Lore ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            release/**
          fail_on_unmatched_files: false
