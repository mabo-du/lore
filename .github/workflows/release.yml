name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  # ── Build Python wheel ──────────────────────────────────────────

  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build distribution
        run: |
          pip install build
          python -m build
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/

  # ── Publish to PyPI ─────────────────────────────────────────────

  publish-pypi:
    needs: build-wheel
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # ── Desktop binaries ────────────────────────────────────────────

  build-desktop:
    needs: build-wheel
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: lore-linux-x86_64
            ext: .tar.gz
          - os: macos-latest
            name: lore-macos-arm64
            ext: .tar.gz
          - os: windows-latest
            name: lore-windows-x86_64
            ext: .zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libopengl0 libxkbcommon0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libdbus-1-3

      - name: Install project + PyInstaller
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Remove incompatible typing backport
        run: pip uninstall -y typing 2>/dev/null || true

      - name: Build standalone executable (onefile)
        run: |
          pyinstaller \
            --onefile \
            --name lore \
            --add-data "src:src" \
            --hidden-import PyQt6 \
            --hidden-import PyQt6.QtQuick \
            --hidden-import faster_whisper \
            --hidden-import ctranslate2 \
            --hidden-import llama_cpp \
            --hidden-import sqlite_vec \
            --hidden-import fastembed \
            --hidden-import cryptography \
            --hidden-import cryptography.fernet \
            --hidden-import cryptography.hazmat.primitives.kdf.pbkdf2 \
            --hidden-import sklearn.cluster \
            --hidden-import sklearn.utils._typedefs \
            --hidden-import sklearn.neighbors._partition_nodes \
            --collect-all gliner2_onnx \
            --collect-all resemblyzer \
            --collect-all pyannote \
            src/main.py
        continue-on-error: true

      - name: Fallback: build with onedir
        if: failure()
        run: |
          pyinstaller \
            --onedir \
            --name lore \
            --add-data "src:src" \
            --hidden-import PyQt6 \
            --hidden-import PyQt6.QtQuick \
            --hidden-import faster_whisper \
            --hidden-import ctranslate2 \
            --hidden-import llama_cpp \
            --hidden-import sqlite_vec \
            --hidden-import fastembed \
            --hidden-import cryptography \
            --hidden-import cryptography.fernet \
            --hidden-import cryptography.hazmat.primitives.kdf.pbkdf2 \
            --hidden-import sklearn.cluster \
            --hidden-import sklearn.utils._typedefs \
            --hidden-import sklearn.neighbors._partition_nodes \
            --collect-all gliner2_onnx \
            --collect-all resemblyzer \
            --collect-all pyannote \
            src/main.py

      - name: Package archive
        shell: bash
        run: |
          if [ -f "dist/lore" ] || [ -f "dist/lore.exe" ]; then
            # Onefile succeeded — just rename and upload
            if [ "${{ runner.os }}" = "Windows" ]; then
              cp dist/lore.exe "${{ matrix.name }}.exe"
            else
              cp dist/lore "${{ matrix.name }}"
            fi
          elif [ -d "dist/lore" ]; then
            # Onedir — archive the directory
            if [ "${{ runner.os }}" = "Windows" ]; then
              7z a "${{ matrix.name }}${{ matrix.ext }}" dist/lore/
            else
              tar -czf "${{ matrix.name }}${{ matrix.ext }}" -C dist lore/
            fi
          else
            # Nothing built — create empty marker
            echo "Build produced no output" > "${{ matrix.name }}.txt"
          fi

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}${{ matrix.ext }}
            ${{ matrix.name }}.exe
            ${{ matrix.name }}
            ${{ matrix.name }}.txt

  # ── GitHub Release ──────────────────────────────────────────────

  create-release:
    needs: [build-wheel, build-desktop]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Lore ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/lore-*
            dist/*.zip
            dist/*.exe
          fail_on_unmatched_files: false
